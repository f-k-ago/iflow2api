# iFlow2API Docker Compose 配置
# 用于快速部署 iFlow2API 服务

services:
  iflow2api:
    image: ghcr.io/f-k-ago/iflow2api:edge
    container_name: iflow2api
    restart: unless-stopped
    user: "0:0"
    ports:
      - "28000:28000"
    environment:
      HOME: /home/appuser
      TZ: Asia/Shanghai
    volumes:
      # iflow2api 应用配置（WebUI 设置、账号池、管理员用户、日志、密钥）
      - ./data/iflow2api:/home/appuser/.iflow2api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
