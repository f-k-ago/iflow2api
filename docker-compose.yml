# iFlow2API Docker Compose 配置
# 用于快速部署 iFlow2API 服务
#
# 使用私有 GHCR 镜像前需要先登录：
# echo "YOUR_GITHUB_TOKEN" | docker login ghcr.io -u YOUR_GITHUB_USERNAME --password-stdin
#
# Token 权限要求：read:packages
# 创建 Token: https://github.com/settings/tokens

version: '3.8'

services:
  iflow2api:
    image: ghcr.io/f-k-ago/iflow2api:edge
    container_name: iflow2api
    restart: unless-stopped
    ports:
      - "28000:28000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=28000
    volumes:
      # 配置目录（通过 Web UI 管理，支持 OAuth 自动刷新）
      - iflow2api-config:/home/appuser/.iflow
      # 如果已有本地配置，可以挂载（二选一）：
      # - ~/.iflow:/home/appuser/.iflow:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  iflow2api-config:
    driver: local
